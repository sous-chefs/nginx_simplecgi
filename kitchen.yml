---
driver:
  name: vagrant

provisioner:
  name: policyfile_zero
  product_name: chef
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  policyfile: Policyfile.rb

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: debian-12
  - name: ubuntu-24.04

suites:
  - name: default
    provisioner:
      named_run_list: default
    verifier:
      inspec_tests:
        - test/integration/default
